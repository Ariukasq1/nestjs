version: '3.8'
services:
  mysql:
    image: mysql
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: playmo
      MYSQL_USER: user
      MYSQL_PASSWORD: root
    volumes:
      - ./prisma/data:/var/lib/mysql

  nodejs:
    container_name: nodejs
    build: .
    tty: true
    command: npm run start
    ports:
      - '3000:3000'
    volumes:
      - .:/app
    depends_on:
      - mysql
    env_file:
      - ./prisma/.env

